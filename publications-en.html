<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Publications — Disaster Geoinformatics Lab. (ReGiD)</title>
  <meta name="description"
    content="Peer-reviewed publications of the Disaster Geoinformatics Laboratory (ReGiD), IRIDeS, Tohoku University.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>

<body data-page="publications">

  <div id="site-header"></div>

  <div class="page-header">
    <div class="container">
      <p class="eyebrow mb-1">Research output</p>
      <h1 class="fw-bold mb-2">Publications</h1>
      <p class="text-secondary mb-0 col-lg-8">Peer-reviewed journal articles, plus conference papers and abstracts.</p>
    </div>
  </div>

  <section class="section">
    <div class="container">

      <ul class="nav pub-tabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="journals-tab" data-bs-toggle="tab" data-bs-target="#journals"
            type="button" role="tab">Peer-reviewed journal</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="conferences-tab" data-bs-toggle="tab" data-bs-target="#conferences" type="button"
            role="tab">Abstract and Conference</button>
        </li>
      </ul>

      <div class="tab-content">

        <!-- ===================== JOURNALS (grouped by year) ===================== -->
        <div class="tab-pane fade show active pub-tab-panel" id="journals" role="tabpanel"
          aria-labelledby="journals-tab">
          <p class="pub-updated">Last updated: June 2025</p>
          <div id="journals-list"></div>

        </div>

        <!-- ===================== ABSTRACTS & CONFERENCES (grouped by year) ===================== -->
        <div class="tab-pane fade pub-tab-panel" id="conferences" role="tabpanel" aria-labelledby="conferences-tab">
          <p class="pub-updated">Last updated: December 2024</p>
          <div id="conferences-list"></div>

        </div>

      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/site.js"></script>
  <script src="assets/js/publications.js"></script>
</body>

</html>
